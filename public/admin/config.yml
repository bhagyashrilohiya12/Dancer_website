backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "bio"
    label: "Bio"
    files:
      - file: "public/content/bio.json"
        label: "Bio Info"
        name: "bio"
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string", required: false }
          - { label: "Location", name: "location", widget: "string", required: false }
          - { label: "Styles", name: "styles", widget: "list", required: false }
          - { label: "Press / Collaborators", name: "press", widget: "list", required: false }
          - { label: "Availability", name: "availability", widget: "string", required: false }
          - { label: "Response Time", name: "responseTime", widget: "string", required: false }
          - { label: "Booking Types", name: "bookingTypes", widget: "list", required: false }
          - { label: "Booking Blurb", name: "bookingBlurb", widget: "text", required: false }
          - { label: "Bio", name: "bio", widget: "text" }
          - { label: "Hero / Dance Photo", name: "profileImage", widget: "image", required: false }

  - name: "gallery"
    label: "Gallery"
    files:
      - file: "public/content/gallery.json"
        label: "Gallery"
        name: "gallery"
        fields:
          - { label: "Image Upload", name: "image", widget: "image", required: false }
          - { label: "Image Link", name: "imageLink", widget: "string", required: false }
          - { label: "Caption", name: "caption", widget: "string" }
          - { label: "Featured", name: "featured", widget: "boolean", required: false }

  - name: "videos"
    label: "Videos"
    files:
      - file: "public/content/videos.json"
        label: "Videos"
        name: "videos"
        fields:
          - { label: "Video Upload", name: "video", widget: "file", required: false }
          - { label: "Video Link", name: "url", widget: "string", required: false }
          - { label: "Thumbnail", name: "thumbnail", widget: "image", required: false }
          - { label: "Caption", name: "caption", widget: "string" }
          - { label: "Featured", name: "featured", widget: "boolean", required: false }

  - name: "events"
    label: "Events"
    files:
      - file: "public/content/events.json"
        label: "Events"
        name: "events"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Date", name: "date", widget: "string" }
          - { label: "Location", name: "location", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }

  - name: "contact"
    label: "Contact"
    files:
      - file: "public/content/contact.json"
        label: "Contact Info"
        name: "contact"
        fields:
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Instagram", name: "instagram", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string", required: false }
